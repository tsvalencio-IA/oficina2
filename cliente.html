<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Portal do Cliente</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&family=Exo+2:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
body { overflow-y: auto; background: #060A14; color: #E8F4FF; font-family: 'Exo 2', sans-serif; margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --brand: #00D4FF; --brand-dim: rgba(0, 212, 255, 0.12);
  --success: #00FF88; --success-dim: rgba(0, 255, 136, 0.1);
  --warn: #FFB800; --warn-dim: rgba(255, 184, 0, 0.1);
  --danger: #FF3B3B; --danger-dim: rgba(255, 59, 59, 0.1);
  --surf-0: #060A14; --surf-1: #0C1426; --surf-2: #111D35; --surf-3: #162040;
  --border: rgba(0, 212, 255, 0.15);
  --text-primary: #E8F4FF; --text-muted: #7A9AB8;
  --ff-display: 'Rajdhani', sans-serif; --ff-mono: 'JetBrains Mono', monospace;
  --r-md: 8px; --r-lg: 12px; --r-xl: 16px;
}

::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: var(--surf-1); }
::-webkit-scrollbar-thumb { background: var(--surf-3); border-radius: 4px; }

.portal-login { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; background: var(--surf-0); position: relative; }
.portal-login::before { content: ''; position: absolute; inset: 0; background: radial-gradient(circle at top right, rgba(0,212,255,0.1), transparent 50%); pointer-events: none; }
.portal-login-card { width: 100%; max-width: 380px; background: var(--surf-1); border: 1px solid var(--border); border-radius: var(--r-xl); padding: 36px 28px; box-shadow: 0 10px 40px rgba(0,0,0,0.6); position: relative; z-index: 2; }
.portal-login-card::before { content: ''; position: absolute; top: 0; left: 10%; right: 10%; height: 3px; background: linear-gradient(90deg, transparent, var(--brand), transparent); }

.portal-header { background: rgba(12, 20, 38, 0.95); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
.header-top { padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; }
.nav-tabs { display: flex; overflow-x: auto; scrollbar-width: none; border-top: 1px solid rgba(255,255,255,0.05); }
.nav-tabs::-webkit-scrollbar { display: none; }
.tab-btn { flex: 1; min-width: max-content; padding: 12px 16px; background: transparent; border: none; color: var(--text-muted); font-family: var(--ff-display); font-size: 0.95rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; border-bottom: 3px solid transparent; transition: 0.2s; display: flex; align-items: center; gap: 6px; justify-content: center; }
.tab-btn.active { color: var(--brand); border-bottom-color: var(--brand); background: var(--brand-dim); }
.tab-badge { background: var(--danger); color: white; font-family: var(--ff-mono); font-size: 0.6rem; padding: 2px 6px; border-radius: 10px; display: none; }

.portal-body { max-width: 680px; margin: 0 auto; padding: 24px 16px; }
.tab-content { display: none; animation: fadeIn 0.3s ease; }
.tab-content.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

.input { width: 100%; padding: 14px 16px; background: var(--surf-2); border: 1px solid var(--border); border-radius: var(--r-md); color: #fff; font-family: var(--ff-mono); font-size: 0.9rem; transition: 0.2s; margin-bottom: 16px; }
.input:focus { border-color: var(--brand); outline: none; background: rgba(0,212,255,0.05); }
.input::placeholder { color: var(--text-muted); }
.label { display: block; font-family: var(--ff-mono); font-size: 0.65rem; color: var(--text-muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; }

.btn { padding: 14px 20px; border: none; border-radius: var(--r-md); font-family: var(--ff-display); font-size: 0.95rem; font-weight: 700; letter-spacing: 1px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; text-transform: uppercase; }
.btn-brand { background: var(--brand); color: #000; box-shadow: 0 4px 15px rgba(0,212,255,0.2); }
.btn-success { background: var(--success); color: #000; box-shadow: 0 4px 15px rgba(0,255,136,0.2); }
.btn-outline { background: transparent; border: 1px solid var(--brand); color: var(--brand); }
.btn-danger { background: var(--danger-dim); border: 1px solid var(--danger); color: var(--danger); }

.os-card { background: var(--surf-1); border: 1px solid var(--border); border-radius: var(--r-xl); overflow: hidden; margin-bottom: 20px; box-shadow: 0 8px 25px rgba(0,0,0,0.3); }
.os-header-premium { padding: 20px; background: linear-gradient(to bottom right, var(--surf-2), var(--surf-1)); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: flex-start; }
.placa-mercosul { display: inline-block; background: #fff; border: 1px solid #ccc; border-radius: 4px; overflow: hidden; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.4); }
.placa-mercosul-top { background: #003399; color: #fff; font-family: sans-serif; font-size: 0.5rem; font-weight: 700; padding: 2px 0; text-transform: uppercase; letter-spacing: 1px; }
.placa-mercosul-txt { color: #000; font-family: var(--ff-mono); font-size: 1.2rem; font-weight: 700; letter-spacing: 2px; padding: 4px 12px; }
.os-km-box { display: flex; flex-direction: column; align-items: flex-end; }
.os-km-val { font-family: var(--ff-mono); font-size: 1.1rem; font-weight: 700; color: var(--brand); }
.os-km-lbl { font-family: var(--ff-mono); font-size: 0.55rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }

.stepper-wrap { padding: 20px; border-bottom: 1px dashed var(--border); }
.stepper { display: flex; align-items: center; justify-content: space-between; position: relative; }
.step-line { position: absolute; top: 14px; left: 5%; right: 5%; height: 2px; background: var(--border); z-index: 0; }
.step-line-fill { position: absolute; top: 14px; left: 5%; height: 2px; background: var(--success); z-index: 0; transition: 0.5s; }
.step { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; gap: 8px; flex: 1; }
.step-dot { width: 30px; height: 30px; border-radius: 50%; background: var(--surf-1); border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; font-family: var(--ff-mono); font-size: 0.7rem; font-weight: 700; color: var(--text-muted); transition: 0.3s; }
.step.done .step-dot { background: var(--success); border-color: var(--success); color: #000; }
.step.active .step-dot { background: var(--brand-dim); border-color: var(--brand); color: var(--brand); box-shadow: 0 0 15px rgba(0,212,255,0.4); }
.step-lbl { font-family: var(--ff-mono); font-size: 0.55rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; text-align: center; line-height: 1.1; }
.step.active .step-lbl { color: var(--brand); font-weight: 700; }
.step.done .step-lbl { color: var(--success); }

.alerta-orcamento { margin: 20px; padding: 20px; background: linear-gradient(135deg, var(--warn-dim), transparent); border-left: 4px solid var(--warn); border-radius: 0 var(--r-md) var(--r-md) 0; }
.badge-historico { margin: 0 20px 20px; padding: 12px; background: rgba(0, 212, 255, 0.05); border: 1px dashed var(--brand); border-radius: var(--r-md); text-align: center; font-family: var(--ff-mono); font-size: 0.8rem; color: var(--brand); }

.os-details { display: none; padding: 20px; background: rgba(0,0,0,0.2); }
.os-card.expanded .os-details { display: block; }
.btn-toggle-detalhes { width: 100%; padding: 14px; background: transparent; border: none; color: var(--text-muted); font-family: var(--ff-mono); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
.btn-toggle-detalhes:hover { color: var(--brand); background: var(--surf-2); }
.detalhe-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.85rem; }
.detalhe-row:last-child { border-bottom: none; }
.detalhe-valor { font-family: var(--ff-mono); font-weight: 700; }

.timeline-box { margin-top: 20px; padding: 20px; background: var(--surf-2); border-radius: var(--r-md); border: 1px solid var(--border); }
.timeline { padding-left: 14px; border-left: 2px solid var(--border); }
.tl-item { padding: 0 0 16px 16px; position: relative; }
.tl-item::before { content: ''; position: absolute; left: -21px; top: 4px; width: 12px; height: 12px; background: var(--brand); border: 2px solid var(--surf-2); border-radius: 50%; box-shadow: 0 0 8px var(--brand-dim); }
.tl-date { font-family: var(--ff-mono); font-size: 0.65rem; color: var(--text-muted); margin-bottom: 4px; letter-spacing: 1px; }
.tl-action { font-size: 0.9rem; color: var(--text-primary); line-height: 1.4; }

.media-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 10px; margin-top: 12px; }
.media-item { aspect-ratio: 1; border-radius: var(--r-md); overflow: hidden; background: #000; border: 1px solid var(--border); position: relative; cursor: zoom-in; }
.media-item img { width: 100%; height: 100%; object-fit: cover; }
.media-video-icon { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; color: var(--brand); background: rgba(0,0,0,0.5); }

.chat-container { display: flex; flex-direction: column; height: calc(100vh - 150px); background: var(--surf-1); border: 1px solid var(--border); border-radius: var(--r-xl); overflow: hidden; }
.chat-msgs { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; background: var(--surf-0); }
.chat-msg { padding: 12px 16px; border-radius: var(--r-lg); max-width: 85%; font-size: 0.9rem; line-height: 1.4; position: relative; }
.chat-msg.outgoing { background: var(--brand-dim); border: 1px solid var(--border); color: #fff; align-self: flex-end; border-bottom-right-radius: 0; }
.chat-msg.incoming { background: var(--surf-2); border: 1px solid var(--border); color: #fff; align-self: flex-start; border-bottom-left-radius: 0; }
.chat-author { font-family: var(--ff-mono); font-size: 0.6rem; color: var(--brand); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 1px; }
.chat-time { font-family: var(--ff-mono); font-size: 0.6rem; color: rgba(255,255,255,0.4); text-align: right; margin-top: 6px; }
.chat-input-area { padding: 14px; background: var(--surf-2); border-top: 1px solid var(--border); display: flex; gap: 10px; align-items: center; }

.fin-resumo { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 24px; }
.fin-box { padding: 20px; border-radius: var(--r-xl); border: 1px solid var(--border); }
.fin-box.aberto { background: linear-gradient(135deg, var(--danger-dim), transparent); border-color: rgba(255,59,59,0.3); }
.fin-box.pago { background: var(--surf-2); }
.fin-lbl { font-family: var(--ff-mono); font-size: 0.65rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
.fin-box.aberto .fin-lbl { color: var(--danger); }
.fin-box.pago .fin-lbl { color: var(--success); }
.fin-val { font-family: var(--ff-display); font-size: 1.8rem; font-weight: 700; color: #fff; }
.extrato-item { display: flex; justify-content: space-between; align-items: center; padding: 16px; background: var(--surf-1); border: 1px solid var(--border); border-radius: var(--r-md); margin-bottom: 10px; border-left: 4px solid transparent; }
.extrato-item.Pendente { border-left-color: var(--danger); }
.extrato-item.Pago { border-left-color: var(--success); }

#toastBox { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
.toast-j { padding: 14px 20px; border-radius: var(--r-md); font-family: var(--ff-mono); font-size: 0.8rem; border-left: 4px solid; background: #111; box-shadow: 0 4px 15px rgba(0,0,0,0.5); display: flex; align-items: center; gap: 10px; transition: 0.4s; }
.toast-j.ok { border-color: var(--success); color: var(--success); }
.toast-j.err { border-color: var(--danger); color: var(--danger); }
.toast-j.warn { border-color: var(--warn); color: var(--warn); }
</style>
</head>
<body>
<div id="toastBox"></div>

<div id="loginView" class="portal-bg">
  <div class="portal-login">
    <div class="portal-login-card">
      <div style="text-align:center;margin-bottom:32px">
        <div style="width:64px;height:64px;border-radius:var(--r-xl);background:linear-gradient(135deg, var(--brand-dim), transparent);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:var(--ff-display);font-size:2rem;font-weight:800;color:var(--brand);margin:0 auto 16px;box-shadow: 0 0 20px rgba(0,212,255,0.1);" id="portalLogoMark">J</div>
        <div style="font-family:var(--ff-display);font-size:1.5rem;font-weight:700;letter-spacing:1px;" id="portalOficinaName">Portal do Cliente</div>
        <div style="font-family:var(--ff-mono);font-size:0.65rem;color:var(--brand);margin-top:6px;letter-spacing:2px;text-transform:uppercase;">Acesso Digital Exclusivo</div>
      </div>
      <div id="portalLoginErr" style="display:none; background: var(--danger-dim); color: var(--danger); padding: 14px; border-radius: var(--r-md); font-size: 0.85rem; margin-bottom: 20px; text-align: center; border: 1px solid rgba(255,59,59,0.3);"></div>
      <label class="label">Placa do Veículo ou Usuário</label>
      <input class="input" id="pLogin" placeholder="Ex: ABC-1234" autocomplete="off" autocorrect="off" autocapitalize="off">
      <label class="label">PIN de Segurança</label>
      <input class="input" id="pPin" type="password" placeholder="••••••" style="margin-bottom: 24px;">
      <button class="btn btn-brand" onclick="portalLogin()" id="btnLoginBtn">ACESSAR MEU PAINEL</button>
      <div style="text-align:center;margin-top:24px;font-size:0.75rem;color:var(--text-muted);font-family:var(--ff-mono);">Credenciais fornecidas pelo atendimento via WhatsApp.</div>
    </div>
  </div>
</div>

<div id="portalView" style="display:none" class="portal-bg">
  <div class="portal-header">
    <div class="header-top">
      <div style="display:flex;align-items:center;gap:12px">
        <div style="width:36px;height:36px;border-radius:var(--r-md);background:var(--brand-dim);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:var(--ff-display);font-size:1.2rem;font-weight:800;color:var(--brand)" id="portalHdrMark">J</div>
        <div>
          <div style="font-family:var(--ff-display);font-size:1.1rem;font-weight:700;letter-spacing:1px;color:#fff;" id="portalHdrName">Oficina</div>
          <div style="font-family:var(--ff-mono);font-size:0.65rem;color:var(--success);text-transform:uppercase;letter-spacing:1px;" id="portalClienteNome">Carregando...</div>
        </div>
      </div>
      <button onclick="portalLogout()" style="background:transparent;border:1px solid rgba(255,255,255,0.2);color:var(--text-muted);padding:8px 16px;font-size:0.75rem;border-radius:20px;font-family:var(--ff-mono);cursor:pointer;">SAIR ⏻</button>
    </div>
    
    <div class="nav-tabs">
      <button class="tab-btn active" onclick="switchCliTab('tabOS', this)">🚘 O.S.</button>
      <button class="tab-btn" onclick="switchCliTab('tabChat', this)">💬 CHAT <span class="tab-badge" id="cliChatBadge">0</span></button>
      <button class="tab-btn" onclick="switchCliTab('tabFin', this)">💳 EXTRATO</button>
      <button class="tab-btn" onclick="switchCliTab('tabAgd', this)">📅 AGENDAR</button>
    </div>
  </div>

  <div class="portal-body">
    <div id="tabOS" class="tab-content active"><div id="renderOSArea"></div></div>

    <div id="tabChat" class="tab-content">
      <div class="chat-container">
        <div style="padding:16px 20px; background:var(--surf-2); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between;">
          <div style="font-family:var(--ff-display);font-size:1.2rem;font-weight:700;color:white;">Atendimento Direto</div>
          <div style="font-family:var(--ff-mono);font-size:0.6rem;color:var(--success);border:1px solid var(--success);padding:4px 10px;border-radius:12px;display:flex;align-items:center;gap:6px;"><div style="width:6px;height:6px;background:var(--success);border-radius:50%;box-shadow:0 0 5px var(--success);"></div> ONLINE</div>
        </div>
        <div class="chat-msgs" id="renderChatArea"><div style="text-align:center;color:var(--text-muted);font-size:0.85rem;padding:20px;">Envie uma mensagem, foto ou áudio para o mecânico.</div></div>
        <div class="chat-input-area">
          <button id="btnPttCli" title="Gravar Áudio" onclick="_togglePttCli()" style="background:var(--surf-3);border:1px solid var(--border);color:white;font-size:1.2rem;cursor:pointer;width:44px;height:44px;border-radius:50%;transition:0.2s;display:flex;align-items:center;justify-content:center;">🎤</button>
          <button title="Anexar Arquivo" onclick="document.getElementById('portalFile').click()" style="background:var(--surf-3);border:1px solid var(--border);color:var(--brand);font-size:1.2rem;cursor:pointer;width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;">📎</button>
          <input type="file" id="portalFile" style="display:none" accept="image/*,video/*,audio/*,.pdf" onchange="_enviarArquivoPortal(this)">
          <input class="input" id="portalChatInput" placeholder="Mensagem..." style="margin:0;border-radius:24px;padding:12px 20px;">
          <button class="btn-brand" style="border:none;border-radius:50%;width:44px;height:44px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1.2rem;" onclick="_enviarPortalMsg()">➤</button>
        </div>
      </div>
    </div>

    <div id="tabFin" class="tab-content"><div id="renderFinArea"></div></div>

    <div id="tabAgd" class="tab-content">
      <div style="background:var(--surf-1); border:1px solid var(--border); border-radius:var(--r-xl); padding:24px; margin-bottom:24px; box-shadow: 0 4px 15px rgba(0,0,0,0.2);">
        <div style="font-family:var(--ff-display);font-size:1.4rem;font-weight:700;color:white;margin-bottom:20px;">Solicitar Nova Revisão</div>
        <label class="label">Veículo</label><select class="input" id="agdVeiculoCli"><option value="">Carregando veículos...</option></select>
        <label class="label">Data de Preferência</label><input type="date" class="input" id="agdDataCli">
        <label class="label">O que precisa ser feito?</label><input type="text" class="input" id="agdServicoCli" placeholder="Ex: Troca de óleo, Barulho na roda...">
        <button class="btn btn-brand" onclick="_salvarAgendamentoCli()">ENVIAR SOLICITAÇÃO</button>
      </div>
      <div id="renderAgdArea"></div>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="js/config.js?v=99"></script>
<script>
// ============================================================
// CORE LÓGICA E FIREBASE
// ============================================================
const db = window.initFirebase();
let P = { clienteId: null, tenantId: null, cliente: null, oficina: null, veiculos: [] };
const formatter = new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' });

function toast(msg, type='ok') {
  const el = document.createElement('div'); el.className = `toast-j ${type}`;
  const icon = type === 'ok' ? '✓' : type === 'err' ? '✕' : '⚠';
  el.innerHTML = `<strong>${icon}</strong> ${msg}`;
  document.getElementById('toastBox').appendChild(el);
  setTimeout(() => { el.style.opacity='0'; setTimeout(()=>el.remove(),400); }, 3500);
}

function switchCliTab(tabId, btnEl) {
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(tabId).classList.add('active'); btnEl.classList.add('active');
  if(tabId === 'tabChat') { const msgsContainer = document.getElementById('renderChatArea'); if(msgsContainer) msgsContainer.scrollTop = msgsContainer.scrollHeight; }
}

const params = new URLSearchParams(window.location.search);
const _tenantSlug = params.get('tenant') || params.get('t') || null;
if (_tenantSlug) _carregarBrandTenant(_tenantSlug);

async function _carregarBrandTenant(tenantId) {
  try {
    const snap = await db.collection('oficinas').doc(tenantId).get();
    if (!snap.exists) return;
    const d = snap.data();
    document.getElementById('portalOficinaName').textContent = d.nomeFantasia || 'Portal do Cliente';
    const logoL = (d.nomeFantasia||'J').charAt(0).toUpperCase();
    document.getElementById('portalLogoMark').textContent = logoL; document.getElementById('portalHdrMark').textContent  = logoL; document.getElementById('portalHdrName').textContent  = d.nomeFantasia || 'Oficina Parceira';
    P.tenantId = tenantId; P.oficina  = d;
  } catch(e) {}
}

document.getElementById('pPin').addEventListener('keydown', e => { if (e.key === 'Enter') portalLogin(); });
document.getElementById('pLogin').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('pPin').focus(); });

async function portalLogin() {
  const rawLogin = document.getElementById('pLogin').value.trim().toLowerCase();
  const pin   = document.getElementById('pPin').value.trim();
  const err   = document.getElementById('portalLoginErr');
  err.style.display = 'none';

  if (!rawLogin || !pin) { err.textContent = 'Preencha usuário e PIN.'; err.style.display='block'; return; }
  const btn = document.getElementById('btnLoginBtn'); btn.innerHTML = '<span class="spinner"></span> VALIDANDO...'; btn.disabled = true;

  try {
    let authSuccess = false;
    let qOS = db.collection('ordens_servico').where('pin', '==', pin);
    if (P.tenantId) qOS = qOS.where('tenantId', '==', P.tenantId);
    const snapOS = await qOS.get();

    if (!snapOS.empty) {
        for (let doc of snapOS.docs) {
            let osData = doc.data();
            let p = (osData.placa || '').toLowerCase().replace(/[^a-z0-9]/g, ''); 
            let c = (osData.cpf || '').toLowerCase().replace(/\D/g, ''); 
            let n = (osData.cliente || '').split(' ')[0].toLowerCase();
            let userLimpo = rawLogin.replace(/[^a-z0-9]/g, ''); 
            if (p === userLimpo || c === userLimpo || n === rawLogin) {
                P.tenantId = osData.tenantId; P.clienteId = osData.clienteId || 'avulso'; P.cliente = { nome: osData.cliente || 'Cliente' };
                authSuccess = true; break;
            }
        }
    }

    if (!authSuccess) {
        let qCli = db.collection('clientes').where('pin', '==', pin);
        if (P.tenantId) qCli = qCli.where('tenantId', '==', P.tenantId);
        const snapCli = await qCli.get();
        if (!snapCli.empty) {
            for (let doc of snapCli.docs) {
                let cliData = doc.data();
                let log = (cliData.login || '').toLowerCase();
                let docCpf = (cliData.doc || '').replace(/\D/g, '');
                let userNum = rawLogin.replace(/\D/g, '');
                if (log === rawLogin || (userNum && docCpf === userNum)) {
                    P.tenantId = cliData.tenantId; P.clienteId = doc.id; P.cliente = { id: doc.id, ...cliData };
                    authSuccess = true; break;
                }
            }
        }
    }

    if (!authSuccess) throw new Error('Usuário ou PIN incorretos. Verifique a placa e a senha enviada.');
    if (!P.oficina && P.tenantId) { const ofSnap = await db.collection('oficinas').doc(P.tenantId).get(); if (ofSnap.exists) { P.oficina = ofSnap.data(); await _carregarBrandTenant(P.tenantId); } }

    document.getElementById('portalClienteNome').textContent = P.cliente?.nome || 'Olá, Cliente';
    document.getElementById('loginView').style.display  = 'none'; document.getElementById('portalView').style.display = 'block';
    _iniciarPortalListeners();
  } catch(e) {
    err.textContent = e.message; err.style.display = 'block'; btn.innerHTML = 'ACESSAR MEU PAINEL'; btn.disabled = false;
  }
}

function portalLogout() {
  P = { clienteId: null, tenantId: null, cliente: null, oficina: null, veiculos: [] };
  document.getElementById('loginView').style.display  = 'block'; document.getElementById('portalView').style.display = 'none';
  document.getElementById('pLogin').value = ''; document.getElementById('pPin').value   = '';
  document.getElementById('btnLoginBtn').innerHTML = 'ACESSAR MEU PAINEL'; document.getElementById('btnLoginBtn').disabled = false;
}

function _iniciarPortalListeners() {
  const loginUpper = document.getElementById('pLogin').value.trim().toUpperCase().replace(/[^A-Z0-9]/g, '');
  if(P.clienteId && P.clienteId !== 'avulso') {
    db.collection('veiculos').where('tenantId', '==', P.tenantId).where('clienteId', '==', P.clienteId).onSnapshot(snap => {
        P.veiculos = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        const el = document.getElementById('agdVeiculoCli');
        if (el) el.innerHTML = '<option value="">Selecione o Veículo...</option>' + P.veiculos.map(v => `<option value="${v.id}">${v.placa} - ${v.modelo}</option>`).join('');
      });
  }

  db.collection('ordens_servico').where('tenantId', '==', P.tenantId).onSnapshot(snap => {
      const osList = snap.docs.map(d => ({ id: d.id, ...d.data() })).filter(d => {
            const pLimpa = (d.placa || '').toUpperCase().replace(/[^A-Z0-9]/g, '');
            return (P.clienteId !== 'avulso' && d.clienteId === P.clienteId) || (pLimpa && pLimpa === loginUpper) || (d.pin && d.pin === document.getElementById('pPin').value.trim()); 
        }).sort((a, b) => (b.updatedAt || '') > (a.updatedAt || '') ? 1 : -1);
      _renderPortalOS(osList);
    });

  if(P.clienteId && P.clienteId !== 'avulso') {
      db.collection('mensagens').where('tenantId', '==', P.tenantId).where('clienteId', '==', P.clienteId).onSnapshot(snap => {
          const msgs = snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b)=>(a.ts||0)-(b.ts||0)); _renderChat(msgs);
        });
      db.collection('financeiro').where('tenantId', '==', P.tenantId).where('clienteId', '==', P.clienteId).onSnapshot(snap => {
          const finList = snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b)=>(b.venc||'') > (a.venc||'') ? 1 : -1); _renderFinanceiro(finList);
        });
      db.collection('agendamentos').where('tenantId', '==', P.tenantId).where('clienteId', '==', P.clienteId).onSnapshot(snap => {
          const agdList = snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b)=>(b.data||'') > (a.data||'') ? 1 : -1); _renderAgendamento(agdList);
        });
  } else {
      document.getElementById('renderFinArea').innerHTML = '<div style="text-align:center;padding:30px;color:var(--text-muted);">Área financeira disponível apenas para clientes cadastrados.</div>';
      document.getElementById('renderAgdArea').innerHTML = '';
  }
}

// 🚘 RENDERIZAÇÃO DAS O.S.
function _renderPortalOS(osList) {
  const content = document.getElementById('renderOSArea');
  const STEPS = ['patio', 'orcamento', 'aprovacao', 'box', 'pronto', 'faturado', 'entregue'];
  const STEP_LABELS = { patio: 'Pátio', orcamento: 'Orç.', aprovacao: 'Aguard.', box: 'Serviço', pronto: 'Pronto', faturado: 'Faturado', entregue: 'Entreg.' };
  const STATUS_MAP_LEGACY = { 'Aguardando': 'patio', 'Concluido': 'entregue', 'Triagem': 'patio', 'Orcamento': 'orcamento', 'Orcamento_Enviado': 'aprovacao', 'Aprovado': 'box', 'Andamento': 'box', 'Pronto': 'pronto', 'Entregue': 'entregue', 'Cancelado': 'cancelado' };

  if (!osList.length) { content.innerHTML = `<div style="text-align:center;padding:48px 20px;background:var(--surf-1);border-radius:var(--r-xl);border:1px dashed var(--border);"><div style="font-size:3rem;margin-bottom:16px">🚘</div><div style="font-family:var(--ff-display);font-size:1.3rem;font-weight:700;color:white">Nenhum veículo no pátio</div><div style="font-size:0.9rem;color:var(--text-muted);margin-top:8px">Assim que o serviço iniciar, o acompanhamento aparecerá aqui.</div></div>`; return; }

  content.innerHTML = osList.map(os => {
    let statusLimpo = STATUS_MAP_LEGACY[os.status] || (os.status||'patio').toLowerCase();
    if(!STEPS.includes(statusLimpo) && statusLimpo !== 'cancelado') statusLimpo = 'patio';
    const statusIdx = STEPS.indexOf(statusLimpo); const isConcluida = (statusLimpo === 'pronto' || statusLimpo === 'entregue' || statusLimpo === 'faturado'); const isOrcamento = (statusLimpo === 'aprovacao'); const isCancelada = (statusLimpo === 'cancelado');

    let badgeHistorico = '';
    if (isConcluida && (os.updatedAt || os.data)) {
        const dataRef = new Date(os.updatedAt || os.data); const diffTempo = new Date() - dataRef; const diasDiff = Math.floor(diffTempo / (1000 * 60 * 60 * 24));
        if (diasDiff === 0) badgeHistorico = `<div class="badge-historico">⏱️ Serviço concluído <strong>hoje</strong>.</div>`;
        else if (diasDiff > 0 && diasDiff < 30) badgeHistorico = `<div class="badge-historico">⏱️ Serviço realizado há <strong>${diasDiff} dias</strong>.</div>`;
        else { const meses = Math.floor(diasDiff / 30); badgeHistorico = `<div class="badge-historico">⏱️ Serviço realizado há <strong>${meses} ${meses>1?'meses':'mês'}</strong>. Considere revisar.</div>`; }
    }

    const placaExibicao = (os.placa || 'S/PLACA').toUpperCase().replace(/[^A-Z0-9]/g, ''); const placaFormatada = placaExibicao.length === 7 ? `${placaExibicao.slice(0,3)}-${placaExibicao.slice(3)}` : placaExibicao; const kmExibicao = os.km ? Number(os.km).toLocaleString('pt-BR') : '--';
    const stepperHTML = isCancelada ? `<div style="text-align:center;padding:24px;color:var(--danger);font-weight:700;font-family:var(--ff-display);font-size:1.4rem;letter-spacing:2px;">🚫 ORDEM CANCELADA</div>` : `<div class="stepper-wrap"><div class="stepper"><div class="step-line"></div><div class="step-line-fill" style="width:${Math.max(0, (statusIdx / (STEPS.length-1)) * 90)}%"></div>${STEPS.map((s, i) => { const cls = i < statusIdx ? 'done' : i === statusIdx ? 'active' : 'pending'; const icon = i < statusIdx ? '✓' : (i + 1).toString(); return `<div class="step ${cls}"><div class="step-dot">${icon}</div><div class="step-lbl">${STEP_LABELS[s]}</div></div>`; }).join('')}</div></div>`;
    const orcAlerta = isOrcamento ? `<div class="alerta-orcamento"><div style="font-family:var(--ff-display);font-size:1.2rem;font-weight:700;color:var(--warn);margin-bottom:6px">Orçamento Disponível</div><div style="font-size:0.9rem;color:white;margin-bottom:16px">Valor estimado: <strong style="font-size:1.3rem;">${formatter.format(os.total || 0)}</strong></div><div style="display:flex;gap:10px;flex-wrap:wrap;"><button class="btn btn-success" style="flex:1;" onclick="_aprovarOrcamento('${os.id}')">✓ APROVAR</button><button class="btn btn-outline" style="flex:1;" onclick="_negociarOrcamento('${placaFormatada}')">💬 NEGOCIAR</button><button class="btn btn-danger" style="flex:1;" onclick="_recusarOrcamento('${os.id}')">✕ RECUSAR</button></div></div>` : '';

    let detalheHtml = `<div class="os-details">`;
    if (os.servicos?.length > 0 || os.pecas?.length > 0 || os.maoObra > 0) {
      detalheHtml += `<div style="font-family:var(--ff-mono);font-size:0.65rem;color:var(--brand);letter-spacing:2px;margin-bottom:12px;">DETALHAMENTO TÉCNICO</div>`;
      if(os.servicos) os.servicos.forEach(s => { detalheHtml += `<div class="detalhe-row"><div>🔧 ${s.desc || 'Serviço'}</div><div class="detalhe-valor">${formatter.format(s.valor || 0)}</div></div>`; });
      else if (os.maoObra) detalheHtml += `<div class="detalhe-row"><div>🔧 Mão de Obra Geral</div><div class="detalhe-valor">${formatter.format(os.maoObra || 0)}</div></div>`;
      if(os.pecas) os.pecas.forEach(p => { detalheHtml += `<div class="detalhe-row"><div>📦 ${p.desc || 'Peça'} (x${p.qtd||p.q||1})</div><div class="detalhe-valor" style="color:var(--success)">${formatter.format((p.qtd||p.q||1) * (p.venda||p.v||0))}</div></div>`; });
      detalheHtml += `${os.total ? `<div style="display:flex;justify-content:space-between;align-items:center;padding-top:16px;margin-top:8px;border-top:1px dashed var(--border);"><span style="font-family:var(--ff-mono);font-size:0.75rem;color:var(--success)">VALOR FINAL APROVADO</span><span style="font-family:var(--ff-display);font-size:1.6rem;font-weight:800;color:var(--success)">${formatter.format(os.total)}</span></div>` : ''}`;
    }

    const fotoHTML = (os.media?.length || os.fotos?.length) ? `<div style="margin-top:24px"><div style="font-family:var(--ff-mono);font-size:0.65rem;color:var(--brand);letter-spacing:2px;margin-bottom:8px;">GALERIA / EVIDÊNCIAS</div><div class="media-grid">${(os.media || os.fotos).map(m => (m.type !== 'video' && !m.url?.endsWith('.mp4')) ? `<div class="media-item"><img src="${m.url || m}" onclick="window.open('${m.url || m}','_blank')"></div>` : `<div class="media-item" onclick="window.open('${m.url || m}','_blank')"><div class="media-video-icon">▶️</div></div>`).join('')}</div></div>` : '';
    const timelineHTML = (os.timeline?.length) ? `<div class="timeline-box"><div style="font-family:var(--ff-mono);font-size:0.65rem;color:var(--brand);letter-spacing:2px;margin-bottom:16px;">LINHA DO TEMPO (AUDITORIA)</div><div class="timeline">${[...os.timeline].reverse().map(tl => `<div class="tl-item"><div class="tl-date">${new Date(tl.dt).toLocaleString('pt-BR')} — ${tl.user||'Sistema'}</div><div class="tl-action">${tl.acao}</div></div>`).join('')}</div></div>` : '';
    detalheHtml += fotoHTML + timelineHTML + `</div>`;

    return `
      <div class="os-card">
        <div class="os-header-premium">
          <div class="placa-mercosul"><div class="placa-mercosul-top">BRASIL</div><div class="placa-mercosul-txt">${placaFormatada}</div></div>
          <div class="os-km-box"><div class="os-km-val">${kmExibicao} <small style="font-size:0.7rem">KM</small></div><div class="os-km-lbl">Registrado na O.S.</div></div>
        </div>
        <div style="padding:14px 20px; background:var(--surf-2); border-bottom:1px solid var(--border); font-size:0.85rem; color:var(--text-primary); display:flex; justify-content:space-between; align-items:center;">
          <div><strong style="color:white">${os.veiculo || 'Veículo'}</strong></div><div style="font-family:var(--ff-mono);font-size:0.6rem;color:var(--text-muted)">OS #${os.id.slice(-6).toUpperCase()}</div>
        </div>
        ${stepperHTML}${orcAlerta}
        ${isConcluida ? `<div style="margin:20px;padding:20px;background:var(--success-dim);border:1px solid rgba(0,255,136,0.3);border-radius:var(--r-md);display:flex;align-items:center;gap:16px;"><div style="font-size:2rem">🎉</div><div><div style="font-family:var(--ff-display);font-size:1.3rem;font-weight:700;color:var(--success)">Pronto para Retirada!</div><div style="font-size:0.85rem;line-height:1.4;margin-top:4px;">Seu veículo foi finalizado e aguarda você.</div></div></div>` : ''}
        ${badgeHistorico}
        <button class="btn-toggle-detalhes" onclick="this.closest('.os-card').classList.toggle('expanded'); this.innerHTML = this.closest('.os-card').classList.contains('expanded') ? '▲ ESCONDER DETALHAMENTO' : '▼ VER DETALHAMENTO TÉCNICO'">▼ VER DETALHAMENTO TÉCNICO</button>
        ${detalheHtml}
      </div>`;
  }).join('');
}

// 💳 RENDERIZAÇÃO FINANCEIRO

  let emAberto = 0; let totalPago = 0;

// 💬 CHAT CRM E NEGOCIAÇÃO
let isRecordingCli = false;
let _mediaRecorderCli;
let _audioChunksCli = [];

async function _togglePttCli() {
  const btn = document.getElementById('btnPttCli');
  
  if (isRecordingCli && _mediaRecorderCli && _mediaRecorderCli.state === 'recording') {
    _mediaRecorderCli.stop(); isRecordingCli = false;
    btn.style.color = 'white'; btn.style.background = 'var(--surf-3)'; btn.style.borderColor = 'var(--border)'; btn.innerHTML = '🎤';
    return;
  }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    _mediaRecorderCli = new MediaRecorder(stream); _audioChunksCli = [];
    _mediaRecorderCli.ondataavailable = e => { if (e.data.size > 0) _audioChunksCli.push(e.data); };
    _mediaRecorderCli.onstop = async () => {
      const audioBlob = new Blob(_audioChunksCli, { type: 'audio/webm' });
      const fd = new FormData();
      fd.append('file', audioBlob); fd.append('upload_preset', P.oficina?.cloudPreset || 'evolution');
      btn.innerHTML = '<span style="font-size:0.6rem">⏳</span>';
      try {
        const res = await fetch(`https://api.cloudinary.com/v1_1/${P.oficina?.cloudName || 'dmuvm1o6m'}/auto/upload`, {method:'POST',body:fd});
        const data = await res.json();
        if (data.secure_url) {
          await db.collection('mensagens').add({ tenantId: P.tenantId, clienteId: P.clienteId, sender: 'cliente', msg: `[AUDIO]${data.secure_url}`, lidaAdmin: false, lidaCliente: true, ts: Date.now() });
          toast('Áudio enviado com sucesso!', 'ok');
        }
      } catch (e) { toast('Erro ao enviar áudio', 'err'); } 
      finally { btn.innerHTML = '🎤'; stream.getTracks().forEach(t => t.stop()); }
    };
    _mediaRecorderCli.start(); isRecordingCli = true;
    btn.style.color = 'white'; btn.style.background = 'var(--danger)'; btn.style.borderColor = 'var(--danger)'; btn.innerHTML = '⏹️';
    toast('Gravando... Clique no botão vermelho para enviar.', 'warn');
  } catch (err) { toast('⚠ Permissão de microfone negada.', 'err'); }
}

async function _enviarArquivoPortal(input) {
  const file = input.files[0]; if (!file) return;
  toast('Enviando anexo...', 'warn');
  try {
    const fd = new FormData(); fd.append('file', file); fd.append('upload_preset', P.oficina?.cloudPreset || 'evolution');
    const res = await fetch(`https://api.cloudinary.com/v1_1/${P.oficina?.cloudName || 'dmuvm1o6m'}/auto/upload`, {method:'POST',body:fd});
    const data = await res.json();
    if (data.secure_url) {
      const prefixo = data.resource_type === 'image' ? '[IMAGEM]' : '[ARQUIVO]';
      await db.collection('mensagens').add({ tenantId: P.tenantId, clienteId: P.clienteId, sender: 'cliente', msg: `${prefixo}${data.secure_url}`, lidaAdmin: false, lidaCliente: true, ts: Date.now() });
      toast('Anexo enviado com sucesso!', 'ok');
    }
  } catch(e) { toast('Erro no envio do anexo: ' + e.message, 'err'); } 
  finally { input.value = ''; }
}

function _formatarMidiaChat(texto) {
  if (!texto) return '';
  const t = String(texto).trim();
  if (t.includes('[AUDIO]')) return `<audio src="${t.split('[AUDIO]')[1].trim()}" controls style="height:40px; max-width:100%; outline:none; border-radius:20px;"></audio>`;
  if (t.includes('[IMAGEM]')) return `<img src="${t.split('[IMAGEM]')[1].trim()}" style="max-width:100%; max-height: 250px; border-radius:var(--r-md); cursor:zoom-in; border:1px solid var(--border);" onclick="window.open('${t.split('[IMAGEM]')[1].trim()}')">`;
  if (t.includes('[ARQUIVO]')) return `<a href="${t.split('[ARQUIVO]')[1].trim()}" target="_blank" style="color:var(--brand);text-decoration:underline;font-weight:700;">📎 Abrir Anexo de Documento</a>`;
  return texto;
}

function _renderChat(msgs) {
  const container = document.getElementById('renderChatArea'); const badge = document.getElementById('cliChatBadge');
  if (!container) return;
  if (!msgs.length) { container.innerHTML = '<div style="text-align:center;color:var(--text-muted);font-size:0.85rem;padding:40px 20px;">Nenhuma mensagem ainda. Envie uma mensagem para a oficina.</div>'; if(badge) badge.style.display = 'none'; return; }
  container.innerHTML = msgs.map(m => {
    const t = m.ts ? new Date(m.ts).toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit' }) : '';
    const dir = m.sender === 'cliente' ? 'outgoing' : 'incoming';
    const author = m.sender === 'cliente' ? 'Você' : (P.oficina?.nomeFantasia || 'Oficina');
    return `<div class="chat-msg ${dir}"><div class="chat-author">${author}</div>${_formatarMidiaChat(m.msg)}<div class="chat-time">${t}</div></div>`;
  }).join('');
  container.scrollTop = container.scrollHeight;
  const nLidas = msgs.filter(m => m.sender === 'admin' && !m.lidaCliente).length;
  if(badge) { badge.textContent = nLidas; badge.style.display = nLidas > 0 ? 'inline-block' : 'none'; }
  if (document.getElementById('tabChat').classList.contains('active')) {
    msgs.filter(m => m.sender === 'admin' && !m.lidaCliente).forEach(m => db.collection('mensagens').doc(m.id).update({ lidaCliente: true }).catch(()=>{}));
  }
}

document.getElementById('portalChatInput')?.addEventListener('keydown', e => { if (e.key === 'Enter') _enviarPortalMsg(); });

async function _enviarPortalMsg() {
  const inp = document.getElementById('portalChatInput'); const msg = inp?.value?.trim();
  if (!msg) return;
  await db.collection('mensagens').add({ tenantId: P.tenantId, clienteId: P.clienteId, sender: 'cliente', msg, lidaAdmin: false, lidaCliente: true, ts: Date.now() });
  inp.value = '';
}

function _negociarOrcamento(placa) {
  switchCliTab('tabChat', document.querySelectorAll('.tab-btn')[1]);
  const inp = document.getElementById('portalChatInput');
  if(inp) { inp.value = `Gostaria de negociar o orçamento referente a placa ${placa}. `; inp.focus(); }
}

async function _aprovarOrcamento(osId) {
  try {
    const snap = await db.collection('ordens_servico').doc(osId).get();
    const tl = snap.data().timeline || [];
    tl.push({ dt: new Date().toISOString(), user: P.cliente?.nome || 'Cliente', acao: `Cliente APROVOU o orçamento via Aplicativo B2C` });
    await db.collection('ordens_servico').doc(osId).update({ status: 'Andamento', timeline: tl, updatedAt: new Date().toISOString() });
    await db.collection('lixeira_auditoria').add({ tenantId: P.tenantId, modulo: 'PORTAL B2C', acao: `Orçamento APROVADO: OS #${osId.slice(-5).toUpperCase()}`, usuario: P.cliente?.nome || 'Cliente', ts: new Date().toISOString() });
    toast('Orçamento aprovado com sucesso! O veículo já está na fila de serviço.', 'ok');
  } catch (e) { toast('Erro ao aprovar: ' + e.message, 'err'); }
}

async function _recusarOrcamento(osId) {
  if (!confirm('Tem certeza que deseja recusar? A Ordem de Serviço será CANCELADA permanentemente.')) return;
  try {
    const snap = await db.collection('ordens_servico').doc(osId).get();
    const tl = snap.data().timeline || [];
    tl.push({ dt: new Date().toISOString(), user: P.cliente?.nome || 'Cliente', acao: `Cliente RECUSOU o orçamento via Aplicativo B2C` });
    await db.collection('ordens_servico').doc(osId).update({ status: 'Cancelado', timeline: tl, updatedAt: new Date().toISOString() });
    await db.collection('lixeira_auditoria').add({ tenantId: P.tenantId, modulo: 'PORTAL B2C', acao: `Orçamento RECUSADO: OS #${osId.slice(-5).toUpperCase()}`, usuario: P.cliente?.nome || 'Cliente', ts: new Date().toISOString() });
    toast('Orçamento recusado. Serviço cancelado.', 'warn');
  } catch(e) { toast('Erro ao recusar: ' + e.message, 'err'); }
}
</script>
