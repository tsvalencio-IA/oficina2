<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>JARVIS ERP — Painel de Gestão</title>
  
  <link rel="stylesheet" href="css/design.css">
  
  <style>
    /* Ajustes finos para garantir que nada saia do lugar */
    .kanban-board { display: flex; gap: 16px; padding: 20px; overflow-x: auto; min-height: calc(100vh - 120px); }
    .kanban-col { flex: 0 0 320px; background: var(--bg-card); border-radius: 12px; border: 1px solid var(--border); display: flex; flex-direction: column; }
    .kanban-header { padding: 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .kanban-list { padding: 12px; flex: 1; min-height: 100px; }
    
    /* Indicador de LED para OS Atrasada */
    .led-alert { width: 8px; height: 8px; border-radius: 50%; background: #ef4444; box-shadow: 0 0 8px #ef4444; animation: blink 1s infinite; }
    @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
  </style>
</head>
<body class="dark-theme">

  <div class="app-container">
    
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="logo-mark">J</div>
        <span class="brand-name" id="sbTenantNome">Oficina</span>
      </div>
      
      <nav class="sidebar-nav">
        <button class="nav-item active" onclick="showTab('kanban')">📋 Painel O.S.</button>
        <button class="nav-item" onclick="showTab('clientes')">👥 Clientes</button>
        <button class="nav-item" onclick="showTab('veiculos')">🚗 Veículos</button>
        <button class="nav-item" onclick="showTab('estoque')">📦 Estoque</button>
        <button class="nav-item" onclick="showTab('financeiro')">💰 Financeiro</button>
        <button class="nav-item" onclick="showTab('equipe')">🛠️ Equipe</button>
      </nav>

      <div class="sidebar-footer">
        <div class="user-info">
          <div class="avatar" id="sbAvatar">U</div>
          <div class="user-meta">
            <div class="user-name" id="sbUserNome">Usuário</div>
            <div class="user-role" id="sbUserRole">MASTER</div>
          </div>
        </div>
        <button class="btn-logout" onclick="sair()">Sair</button>
      </div>
    </aside>

    <main class="main-content">
      
      <header class="topbar">
        <div class="topbar-left">
          <h2 id="pageTitle">Quadro de Serviços</h2>
        </div>
        <div class="topbar-actions">
          <label class="btn btn-ghost" style="cursor: pointer;">
            📥 Importar XML NFe
            <input type="file" id="inputXML" accept=".xml" style="display:none" onchange="importarXMLNFe(this.files[0])">
          </label>
          
          <button class="btn btn-brand" onclick="abrirModalOS()">+ Nova O.S.</button>
          <div class="notification-bell">
            🔔 <span class="badge" id="chatBadge">0</span>
          </div>
        </div>
      </header>

      <section id="view-kanban" class="view-section active">
        <div class="kanban-board" id="kanbanBoard">
          </div>
      </section>

      <section id="view-estoque" class="view-section">
        <div class="toolbar">
           <input type="text" class="input" placeholder="Buscar peça..." oninput="filtrarEstoque(this.value)">
           <button class="btn btn-brand" onclick="abrirModalPeca()">+ Adicionar Peça</button>
        </div>
        <div class="table-wrap">
          <table class="table">
            <thead>
              <tr>
                <th>Item</th>
                <th>Quantidade</th>
                <th>Custo</th>
                <th>Venda</th>
                <th>NFe</th>
                <th>Ações</th>
              </tr>
            </thead>
            <tbody id="listaEstoque"></tbody>
          </table>
        </div>
      </section>

      <section id="view-financeiro" class="view-section">
        <div class="financeiro-grid">
          <div class="fin-card-stat">
            <span>Receitas (Pagas)</span>
            <h3 id="finResumoReceita">R$ 0,00</h3>
          </div>
          <div class="fin-card-stat">
            <span>Despesas (Pagas)</span>
            <h3 id="finResumoDespesa">R$ 0,00</h3>
          </div>
          <div class="fin-card-stat highlight">
            <span>Saldo Real</span>
            <h3 id="finResumoSaldo">R$ 0,00</h3>
          </div>
          <div class="fin-card-stat">
            <span>A Receber (Pendentes)</span>
            <h3 id="finResumoPendente">R$ 0,00</h3>
          </div>
        </div>
        <div class="fin-list-container" id="listaFinanceiro"></div>
      </section>

    </main>
  </div>

  <div class="modal" id="modalFaturar">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Finalizar e Faturar O.S.</h3>
        <button class="close-btn" onclick="closeModal('modalFaturar')">&times;</button>
      </div>
      <div class="modal-body">
        <p>Valor Total: <strong id="faturarValorTotal">R$ 0,00</strong></p>
        <div class="form-group">
          <label>Forma de Pagamento</label>
          <select class="input" id="faturarMetodo">
            <option value="Dinheiro">Dinheiro</option>
            <option value="Pix">Pix</option>
            <option value="Cartão de Crédito">Cartão de Crédito</option>
            <option value="Cartão de Débito">Cartão de Débito</option>
            <option value="Boleto">Boleto</option>
          </select>
        </div>
        <div class="form-group">
          <label>Número de Parcelas (1 a 24)</label>
          <input type="number" class="input" id="faturarParcelas" value="1" min="1" max="24">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeModal('modalFaturar')">Cancelar</button>
        <button class="btn btn-brand" id="btnConfirmarFaturar">Confirmar Faturamento</button>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

  <script src="js/config.js"></script>
  <script src="js/core.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/os.js"></script>
  <script src="js/financeiro.js"></script>
  <script src="js/ia.js"></script>
  <script src="js/pdf.js"></script>

  <script>
    // Inicialização do Sistema
    document.addEventListener('DOMContentLoaded', () => {
      window.initCore(); // Função sagrada do seu core.js
    });

    // Troca de Abas
    function showTab(tabId) {
      document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      
      const target = document.getElementById('view-' + tabId);
      if (target) target.classList.add('active');
      
      const titles = { kanban: 'Quadro de Serviços', clientes: 'Gestão de Clientes', veiculos: 'Frota de Veículos', estoque: 'Controle de Estoque', financeiro: 'Fluxo de Caixa', equipe: 'Gestão de Equipe' };
      document.getElementById('pageTitle').textContent = titles[tabId] || 'JARVIS';
    }
  </script>
</body>
</html>
